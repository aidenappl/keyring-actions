commands:
  - name: build
    description: Build the bundled action
    run: npm run build
    syncAfter: false
  - name: release
    description: Build, commit, and push with updated v1 tag
    run: |
      npm run build
      git add -A
      if git diff --cached --quiet; then
        echo "No changes to commit"
      else
        git commit -m "Release $(date +%Y-%m-%d)"
      fi
      git tag -f v1
      git push origin main
      git push origin v1 --force
      echo "✅ Released and v1 tag updated"
    syncAfter: false
  - name: install
    description: Install dependencies
    run: npm install
    syncAfter: false
